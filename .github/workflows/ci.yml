name: ResumeIQ CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  # Pinned to match Dockerfile — update both places together if upgrading spaCy
  SPACY_MODEL_URL: https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        # Cache key includes spaCy URL so a model version bump invalidates the cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ env.SPACY_MODEL_URL }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Install spaCy model (pinned wheel — matches Dockerfile)
      run: pip install ${{ env.SPACY_MODEL_URL }}

    - name: Download NLTK data
      run: |
        python -c "
        import nltk
        for pkg in ['punkt', 'stopwords', 'averaged_perceptron_tagger', 'punkt_tab']:
            nltk.download(pkg, quiet=True)
        "

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false